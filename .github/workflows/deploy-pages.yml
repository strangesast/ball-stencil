name: Deploy web app to GitHub Pages

# Builds web/ (the fully client-side PWA) and publishes it to GitHub Pages.
# The app is served from the project subpath (https://<owner>.github.io/<repo>/),
# so the build base is set to "/<repo>/" via VITE_BASE_PATH.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let the latest win without cancelling an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pipeline parity tests
        run: npm test

      - name: Build (subpath base for Pages)
        run: npm run build
        env:
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"

      # Pages Actions deploy serves the artifact as-is (no Jekyll), but a
      # .nojekyll is cheap insurance against any underscore-prefixed paths.
      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
