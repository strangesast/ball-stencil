  <circle cx="256" cy="256" r="168" fill="url(#ball)" stroke="#2a2f3b" stroke-width="6"/>
  <!-- hemispherical cap seam -->
  <path d="M 88 256 A 168 58 0 0 0 424 256" fill="none" stroke="#5b9cff" stroke-width="7" opacity="0.55"/>
  <!-- draw-through stencil cut holes -->
  <g fill="url(#accent)">
    <circle cx="212" cy="196" r="26"/>
    <circle cx="300" cy="188" r="20"/>
    <circle cx="256" cy="262" r="34"/>
    <circle cx="196" cy="288" r="18"/>
